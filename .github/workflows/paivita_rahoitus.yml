name: Päivitä puoluerahoitusdata

on:
  schedule:
    # Joka sunnuntai klo 06:00 UTC (= 08:00 Helsinki-aikaa)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Mahdollistaa myös manuaalisen ajon GitHubista

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Tarvitaan git push:iin

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Asenna Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Asenna riippuvuudet
        run: pip install requests beautifulsoup4 lxml

      - name: Aja scraper
        run: python .github/scripts/hae_puoluerahoitus.py

      - name: Tarkista muutokset
        id: check
        run: |
          git diff --quiet rahoitus_json/puoluerahoitus.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commitoi ja pushaa jos muutoksia
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rahoitus_json/puoluerahoitus.json
          git commit -m "Auto: päivitä puoluerahoitusdata $(date +'%d.%m.%Y')"
          git push
